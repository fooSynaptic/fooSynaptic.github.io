    <rect fill="#fff" stroke="#334155" x="156" y="148" width="88" height="26" rx="3"/><text x="200" y="165" text-anchor="middle">读书</text>
    <rect fill="#fff" stroke="#334155" x="264" y="148" width="88" height="26" rx="3"/><text x="308" y="165" text-anchor="middle">讨论项目</text>
    <rect fill="#fff" stroke="#334155" x="372" y="148" width="112" height="26" rx="3"/><text x="428" y="165" text-anchor="middle">图书馆相遇</text>
