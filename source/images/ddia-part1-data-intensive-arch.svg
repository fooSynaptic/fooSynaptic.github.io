<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" width="720" height="220" role="img">
  <title>数据密集型应用架构</title>
  <defs>
    <style type="text/css"><![CDATA[
      .outer { fill: #f8fafc; stroke: #64748b; stroke-width: 1.5; }
      .box { fill: #ffffff; stroke: #475569; stroke-width: 1.2; }
      .title { font: 600 15px system-ui,"PingFang SC","Microsoft YaHei",sans-serif; fill: #0f172a; }
      .lbl { font: 500 13px system-ui,"PingFang SC","Microsoft YaHei",sans-serif; fill: #1e293b; }
    ]]></style>
  </defs>
  <rect class="outer" x="8" y="8" width="704" height="204" rx="6"/>
  <text class="title" x="360" y="36" text-anchor="middle">数据密集型应用架构</text>
  <line x1="8" y1="48" x2="712" y2="48" stroke="#cbd5e1" stroke-width="1"/>
  <rect class="box" x="40" y="62" width="192" height="52" rx="3"/>
  <text class="lbl" x="136" y="93" text-anchor="middle">数据库</text>
  <rect class="box" x="264" y="62" width="192" height="52" rx="3"/>
  <text class="lbl" x="360" y="93" text-anchor="middle">缓存</text>
  <rect class="box" x="488" y="62" width="192" height="52" rx="3"/>
  <text class="lbl" x="584" y="93" text-anchor="middle">搜索索引</text>
  <rect class="box" x="40" y="138" width="192" height="52" rx="3"/>
  <text class="lbl" x="136" y="169" text-anchor="middle">流处理</text>
  <rect class="box" x="264" y="138" width="192" height="52" rx="3"/>
  <text class="lbl" x="360" y="169" text-anchor="middle">批处理</text>
  <rect class="box" x="488" y="138" width="192" height="52" rx="3"/>
  <text class="lbl" x="584" y="169" text-anchor="middle">消息队列</text>
</svg>
